# Профиль конфигурации для тестовой среды
# Активируется с помощью spring.profiles.active=test

# Настройки для проекта YAxUnit
# Профиль: yaxunit

# Базовые настройки приложения
app:
  id: test
  # Базовый путь к проекту
  base-path: "/home/alko/develop/open-source/ai/mcp/onec-client-mcp-devkit"

  # Набор исходного кода проекта
  source-set:
    - path: fixtures/configuration
      name: configuration
      type: CONFIGURATION
      purpose: [MAIN]
    - path: exts/client-mcp
      name: ClientMcp
      type: EXTENSION
      purpose: [MAIN]
    - path: tests/src
      name: tests
      type: EXTENSION
      purpose: [TESTS, YAXUNIT]

  # Настройки подключения к информационной базе
  connection:
    connection-string: "File='/home/alko/develop/onec_file_db/client-mcp';"

  # Версия платформы из v8config.json
  platform-version: "8.5.1.1150"

  # Настройки инструментов
  tools:
    # Тип сборщика: DESIGNER или IBCMD
    builder: DESIGNER
    enterprise:
      additional-launch-keys:
        - "/TESTMANAGER"

logging:
  level:
    root: INFO
    io.github.alkoleft: DEBUG